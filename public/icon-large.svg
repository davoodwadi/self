<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Champagne Gold Gradient -->
    <linearGradient id="champagne-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a88d5e" />
      <stop offset="50%" stop-color="#8c7349" />
      <stop offset="100%" stop-color="#6b5633" />
    </linearGradient>

    <!-- Obsidian Dark Gradient -->
    <linearGradient id="obsidian-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <!-- Ambient Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Dark Rounded Rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#obsidian-gradient)" />

  <!-- Inner Champagne Border -->
  <rect width="472" height="472" x="20" y="20" rx="108" fill="none" stroke="url(#champagne-gradient)" stroke-width="2" opacity="0.4" />
  <rect width="460" height="460" x="26" y="26" rx="102" fill="none" stroke="url(#champagne-gradient)" stroke-width="1" opacity="0.15" />

  <!-- 'DW' Monogram Centered -->
  <text 
    x="50%" 
    y="50%" 
    font-family="'Playfair Display', Didot, Georgia, serif" 
    font-size="220" 
    font-weight="600" 
    text-anchor="middle" 
    dominant-baseline="central" 
    fill="url(#champagne-gradient)" 
    filter="url(#glow)">DW</text>

</svg>
